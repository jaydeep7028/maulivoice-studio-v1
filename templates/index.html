<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MauliVoice Studio Ultimate</title>
<meta name="theme-color" content="#080914"/>
<link rel="manifest" href="/static/manifest.json"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
<script src="https://unpkg.com/wavesurfer.js"></script>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><span>MV</span><div><b>MauliVoice Studio Ultimate</b><small>Commercial One-Window Working Build</small></div></div>
    <div class="status-pill" id="topStatus">Ready</div>
  </header>

  <main class="studio">
    <section class="left-panel">
      <form id="processForm">
        <div class="section-title">1. Input</div>

        <label>Project Name</label>
        <input name="project_name" value="MauliVoice Project"/>

        <div class="input-grid">
          <div>
            <label>Main Voice / Audio</label>
            <div id="dropZone" class="drop">
              <input id="audioInput" name="audio" type="file" accept=".mp3,.wav,.m4a,.aac,.flac,.ogg" required/>
              <strong>Drop or click audio</strong>
              <small id="fileName">No file selected</small>
            </div>
          </div>

          <div>
            <label>Background / Ambience Optional</label>
            <div class="drop compact">
              <input name="background" type="file" accept=".mp3,.wav,.m4a,.aac,.flac,.ogg"/>
              <strong>Add ambience</strong>
              <small>Optional music bed</small>
            </div>
          </div>
        </div>

        <div class="section-title">2. Preview</div>
        <div class="wave-card">
          <div id="waveform"></div>
          <audio id="audioPlayer" controls></audio>
          <div class="transport">
            <button type="button" id="playBtn">▶ Play</button>
            <button type="button" id="pauseBtn">⏸ Pause</button>
            <button type="button" id="stopBtn">■ Stop</button>
          </div>
        </div>

        <div class="section-title">3. Subtitles</div>
        <textarea name="script" placeholder="Paste Marathi/Hindi/English script here for SRT export..."></textarea>
      </form>
    </section>

    <aside class="right-panel">
      <div class="section-title">4. Processing</div>

      <label>Voice Preset</label>
      <select form="processForm" name="preset">
        {% for key, item in presets.items() %}
        <option value="{{ key }}">{{ item.name }}</option>
        {% endfor %}
      </select>

      <label>Export Mode</label>
      <select form="processForm" name="export_preset">
        {% for key, item in export_presets.items() %}
        <option value="{{ key }}">{{ item.name }}</option>
        {% endfor %}
      </select>

      <label>Background Volume</label>
      <input form="processForm" name="bg_volume" type="range" min="0.02" max="0.60" step="0.02" value="0.12"/>

      <div class="working-list">
        <div>✅ Voice mastering</div>
        <div>✅ Noise reduction</div>
        <div>✅ Background mixing</div>
        <div>✅ SRT subtitles</div>
        <div>✅ ZIP package</div>
      </div>

      <button form="processForm" class="primary" type="submit">Generate Creator Package</button>

      <div id="status" class="message">Ready.</div>

      <div class="download-box" id="downloads">
        <button disabled>Audio</button>
        <button disabled>SRT</button>
        <button disabled>Project</button>
        <button disabled>ZIP</button>
      </div>
    </aside>
  </main>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/static/js/sw.js").catch(()=>{});
}
</script>
</body>
</html>
